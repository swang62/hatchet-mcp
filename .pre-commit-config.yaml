repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: uv-lock
        name: uv lock
        entry: uv lock --check
        language: system
        files: ^pyproject\.toml$
        pass_filenames: false

      - id: basedpyright
        name: basedpyright
        entry: uv run basedpyright src/
        language: system
        pass_filenames: false
        types_or: [python]
