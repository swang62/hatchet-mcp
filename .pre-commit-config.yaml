repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: uv-lock
        name: uv lock
        entry: uv
        args: [lock, --check]
        language: python
        additional_dependencies: ['uv']
        files: ^pyproject\.toml$
        pass_filenames: false

      - id: basedpyright
        name: basedpyright
        entry: basedpyright
        args: [src/]
        language: python
        types_or: [python]
        additional_dependencies: ['basedpyright']
        pass_filenames: false
