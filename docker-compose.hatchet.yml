# Hatchet Lite — self-hosted orchestration
# Single image + Postgres. No RabbitMQ needed.
# Docs: https://docs.hatchet.run/self-hosting/hatchet-lite

# ── Quick start ──
#   docker compose -f docker-compose.hatchet.yml up -d
#   Open http://localhost:8888
#   Login: admin@example.com / Admin123!!
#   Create a tenant in the UI
#   Generate an API token: Settings → API Tokens → Create
#   Set HATCHET_CLIENT_TOKEN in .env
#   Run worker: uv run python src/hatchet_worker/worker.py

services:
  postgres:
    image: postgres:15.6
    command: postgres -c 'max_connections=200'
    restart: unless-stopped
    environment:
      POSTGRES_USER: hatchet
      POSTGRES_PASSWORD: hatchet
      POSTGRES_DB: hatchet
    volumes:
      - hatchet_lite_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d hatchet -U hatchet"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s
    ports:
      - "5432:5432"

  hatchet-lite:
    image: ghcr.io/hatchet-dev/hatchet/hatchet-lite:latest
    ports:
      - "8888:8888"
      - "7077:7077"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://hatchet:hatchet@postgres:5432/hatchet?sslmode=disable"
      SERVER_AUTH_COOKIE_DOMAIN: localhost
      SERVER_AUTH_COOKIE_INSECURE: "t"
      SERVER_GRPC_BIND_ADDRESS: "0.0.0.0"
      SERVER_GRPC_INSECURE: "t"
      SERVER_GRPC_BROADCAST_ADDRESS: localhost:7077
      SERVER_GRPC_PORT: "7077"
      SERVER_URL: http://localhost:8888
      SERVER_AUTH_SET_EMAIL_VERIFIED: "t"
      SERVER_DEFAULT_ENGINE_VERSION: "V1"
    volumes:
      - hatchet_lite_config:/config

volumes:
  hatchet_lite_postgres_data:
  hatchet_lite_config:
