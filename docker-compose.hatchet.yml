# ── Quick start ──
#   just start
#   Open http://localhost:8888 and login
#   Create a tenant and create an API token
#   Set HATCHET_CLIENT_TOKEN in .env
#   just worker

services:
  postgres:
    image: postgres:15.6
    command: postgres -c 'max_connections=200'
    restart: unless-stopped
    environment:
      POSTGRES_USER: hatchet
      POSTGRES_PASSWORD: hatchet
      POSTGRES_DB: hatchet
    volumes:
      - hatchet_lite_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d hatchet -U hatchet"]
      interval: 60s
      timeout: 10s
      retries: 10
      start_period: 30s
    ports:
      - "5432:5432"

  hatchet-lite:
    image: ghcr.io/hatchet-dev/hatchet/hatchet-lite:latest
    restart: unless-stopped
    ports:
      - "8888:8888"
      - "7077:7077"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      DATABASE_URL: "postgresql://hatchet:hatchet@postgres:5432/hatchet?sslmode=disable"
      SERVER_AUTH_COOKIE_DOMAIN: ${SERVER_URL}
      SERVER_AUTH_COOKIE_INSECURE: "t"
      SERVER_GRPC_BIND_ADDRESS: "0.0.0.0"
      SERVER_GRPC_INSECURE: "t"
      SERVER_GRPC_BROADCAST_ADDRESS: localhost:7077
      SERVER_GRPC_PORT: "7077"
      SERVER_URL: ${SERVER_URL}
      SERVER_AUTH_SET_EMAIL_VERIFIED: "t"
      SERVER_DEFAULT_ENGINE_VERSION: "V1"
      SERVER_OBSERVABILITY_ENABLED: "f"
      SERVER_OPERATIONS_POLL_INTERVAL: "10"
      SCHEDULER_CONCURRENCY_POLLING_MIN_INTERVAL: "5s"
      SCHEDULER_CONCURRENCY_POLLING_MAX_INTERVAL: "10s"
    volumes:
      - hatchet_lite_config:/config

volumes:
  hatchet_lite_postgres_data:
  hatchet_lite_config:
